name: Automated AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Check out repository source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install openai requests
          
      - name: Extract Pull Request Diff
        id: diff
        run: |
          # Fetch the raw diff comparing the PR branch against the target branch
          git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} > pr_diff.txt
          echo "DIFF_PATH=pr_diff.txt" >> $GITHUB_ENV

      - name: Execute OpenRouter Review Selection
        id: openrouter_step
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # Read the diff content safely into an environment variable
          export PR_DIFF=$(cat pr_diff.txt)
          python review_pr.py > review_response.txt

      - name: Comment Review on GitHub PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reviewBody = fs.readFileSync('review_response.txt', 'utf8');
            
            if (reviewBody.trim()) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: "### 🤖 Automated AI Code Review via OpenRouter\n\n" + reviewBody
              });
            }
